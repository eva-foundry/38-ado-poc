name: ADO Bidirectional Sync
# Veritas-Model-ADO Workflow Enhancement 1
# Scheduled sync: every 4 hours
# Purpose: Keep WBS layer in sync with ADO work items

on:
  schedule:
    # Every 4 hours: at minute 0 past hours 0, 4, 8, 12, 16, and 20
    - cron: '0 */4 * * *'
  
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: 'Both'
        type: choice
        options:
          - Both
          - Pull
          - Push
      project:
        description: 'Filter by project (optional, e.g., "37-data-model")'
        required: false
        default: ''
      dry_run:
        description: 'Dry run mode'
        required: false
        default: false
        type: boolean

jobs:
  ado-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATA_MODEL_URL: https://msub-eva-data-model.victoriousgrass-30debbd3.canadacentral.azurecontainerapps.io
      X_ACTOR: github-actions:ado-bidirectional-sync
      ADO_PAT: ${{ secrets.ADO_PAT }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup PowerShell
        shell: pwsh
        run: |
          Write-Host "[INFO] PowerShell $($PSVersionTable.PSVersion)"

      - name: Pre-flight checks
        shell: pwsh
        run: |
          if (-not $env:ADO_PAT) {
            Write-Host "[ERROR] Missing ADO_PAT secret"
            exit 1
          }

          try {
            $health = Invoke-RestMethod "$env:DATA_MODEL_URL/health" -TimeoutSec 10 -ErrorAction Stop
            if ($health.status -ne 'ok') {
              Write-Host "[ERROR] Data model API health is not ok"
              exit 1
            }
            Write-Host "[PASS] Data model API reachable"
          } catch {
            Write-Host "[ERROR] Data model API pre-flight failed: $($_.Exception.Message)"
            exit 1
          }
      
      - name: Run ADO Bidirectional Sync
        shell: pwsh
        run: |
          $mode = "${{ github.event.inputs.mode }}"
          if (-not $mode) { $mode = "Both" }
          
          $project = "${{ github.event.inputs.project }}"
          $dryRun = "${{ github.event.inputs.dry_run }}" -eq "true"
          
          Write-Host "[INFO] ADO Bidirectional Sync"
          Write-Host "  Mode: $mode"
          Write-Host "  Project: $($project ? $project : '(all)')"
          Write-Host "  Dry Run: $dryRun"
          
          $params = @{
            Mode = $mode
          }
          if ($project) { $params.Project = $project }
          if ($dryRun) { $params.DryRun = $true }
          
          $params.DataModelUrl = $env:DATA_MODEL_URL

          & ./scripts/ado-bidirectional-sync.ps1 @params
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
      
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ado-sync-logs
          path: scripts/logs/*.log
          retention-days: 30
      
      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::ADO bidirectional sync failed. Check logs for details."
